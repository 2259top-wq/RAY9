<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>選擇權回測系統 PRO</title>
    <meta name="description" content="Interactive time-series analysis for Options Daily Data">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=8">
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.2.1/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Filters -->
        <aside class="glass-sidebar">
            <div class="sidebar-header">
                <div class="logo"></div>
                <h1>選擇權回測系統</h1>
            </div>

            <div class="filters-container">
                <div class="filter-group">
                    <label for="date-select">交易日期 (Date)</label>
                    <div class="select-wrapper">
                        <select id="date-select" disabled><option>載入中...</option></select>
                    </div>
                </div>

                <div class="filter-group">
                    <label for="contract-select">契約名稱 (Contract)</label>
                    <div class="select-wrapper">
                        <select id="contract-select" disabled><option>載入中...</option></select>
                    </div>
                </div>

                <div class="filter-group">
                    <label for="expiry-select">到期月份 (Expiry)</label>
                    <div class="select-wrapper">
                        <select id="expiry-select" disabled><option>載入中...</option></select>
                    </div>
                </div>

                <div class="filter-group">
                    <label for="type-select">買賣權 (Type)</label>
                    <div class="select-wrapper">
                        <select id="type-select" disabled><option>載入中...</option></select>
                    </div>
                </div>

                <div class="filter-group">
                    <label for="strike-select">履約價 (Strike)</label>
                    <div class="select-wrapper">
                        <select id="strike-select" disabled><option>載入中...</option></select>
                    </div>
                </div>

                <button id="query-btn" class="primary-btn" disabled>
                    <span class="btn-text">查詢資料</span>
                    <div class="spinner hidden"></div>
                </button>

                <button id="batch-export-btn" class="secondary-btn" style="margin-top: 10px; width: 100%; border: 1px solid rgba(0,0,0,0.1); border-radius: 6px; padding: 12px; cursor: pointer; transition: all 0.3s ease; background-color: #f1f5f9;">
                    <span class="btn-text">📸 批次輸出多日圖片</span>
                    <div class="spinner hidden"></div>
                </button>
            </div>
        </aside>

        <!-- Batch Export Modal -->
        <div id="export-modal" class="modal hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease;">
            <div class="modal-content glass-card" style="background: white; padding: 30px; border-radius: 12px; width: 400px; max-width: 90%; max-height: 80vh; display: flex; flex-direction: column;">
                <h2 style="margin-top: 0;">選擇要匯出的日期</h2>
                <p style="color: #64748b; font-size: 14px;">一次勾選多天，系統將自動為您繪圖並下載（會依照目前的合約/履約價等設定）。</p>
                <div style="margin-bottom: 10px;">
                    <label style="cursor:pointer;"><input type="checkbox" id="export-select-all"> 全選</label>
                </div>
                <div id="export-date-list" style="overflow-y: auto; border: 1px solid #e2e8f0; border-radius: 6px; padding: 10px; display: flex; flex-direction: column; gap: 8px; flex: 1;">
                    <!-- Checkboxes -->
                </div>
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button id="export-confirm-btn" class="primary-btn" style="flex: 1;">開始輸出</button>
                    <button id="export-cancel-btn" class="secondary-btn" style="flex: 1; border: 1px solid #ccc;">取消</button>
                </div>
            </div>
        </div>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="top-nav">
                <div class="stats-bar">
                    <div class="stat-card glass-card">
                        <span class="stat-label">總成交量</span>
                        <span class="stat-value" id="stat-volume">-</span>
                    </div>
                    <div class="stat-card glass-card">
                        <span class="stat-label">最高價</span>
                        <span class="stat-value" id="stat-high">-</span>
                    </div>
                    <div class="stat-card glass-card">
                        <span class="stat-label">最低價</span>
                        <span class="stat-value" id="stat-low">-</span>
                    </div>
                </div>
                <div class="chart-controls glass-card" style="display: flex; align-items: center; padding: 0 15px; margin-left: 15px; height: 100%;">
                    <span class="stat-label" style="margin-right: 10px; font-weight: 500; color: #64748b;">顯示模式</span>
                    <select id="display-mode-select" style="margin-right: 15px; background: transparent; border: 1px solid rgba(0,0,0,0.1); border-radius: 4px; padding: 4px 8px; font-family: inherit; font-size: 14px; outline: none; cursor: pointer; color: #1e293b;">
                        <option value="single">單一商品 (Single)</option>
                        <option value="overlay">C/P 重疊 (Overlay)</option>
                    </select>

                    <span class="stat-label" style="margin-right: 10px; font-weight: 500; color: #64748b;">圖表類型</span>
                    <select id="chart-type-select" style="background: transparent; border: 1px solid rgba(0,0,0,0.1); border-radius: 4px; padding: 4px 8px; font-family: inherit; font-size: 14px; outline: none; cursor: pointer; color: #1e293b;">
                        <option value="candle">K線圖 (Candlestick)</option>
                        <option value="line">價位線 (Line)</option>
                    </select>
                </div>
            </header>

            <div class="charts-wrapper" style="display: flex; flex-direction: column; gap: 20px; flex: 1; overflow-y: auto;">
                <div class="chart-container glass-card" style="flex: 1; min-height: 400px; display: flex; flex-direction: column;">
                    <h3 class="chart-title" style="margin-top: 0; color: #64748b; font-weight: 500; padding: 10px 20px 0;">日盤 (08:45 - 13:45)</h3>
                    <div id="no-data-msg-day" class="empty-state">此時段無交易資料</div>
                    <div id="priceChartDay" style="flex: 1; width: 100%; position: relative;"></div>
                </div>
                <div class="chart-container glass-card" style="flex: 1; min-height: 400px; display: flex; flex-direction: column;">
                    <h3 class="chart-title" style="margin-top: 0; color: #64748b; font-weight: 500; padding: 10px 20px 0;">夜盤 (15:00 - 05:00)</h3>
                    <div id="no-data-msg-night" class="empty-state">此時段無交易資料</div>
                    <div id="priceChartNight" style="flex: 1; width: 100%; position: relative;"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="app4.js?v=21"></script>
</body>
</html>
